name: Bug report
description: Relate um comportamento incorreto.
title: "fix: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Resumo
      description: O que esta acontecendo?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Liste os passos, dados e comandos relevantes.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impacto
      description: Quem ou o que foi afetado?
