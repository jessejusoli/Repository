schema_version: 1
subject:
  id: repository
  name: Repository
  type: monorepo-template
coverage:
  - pillar: front_end
    status: applied
    evidence:
      - docs/templates/PROJECT.md
      - docs/checklists/universal-project-readiness.md
    notes: UI projects must declare accessibility, responsive behavior and interface validation.
  - pillar: back_end
    status: applied
    evidence:
      - contracts/openapi/repository.template.openapi.yaml
      - docs/architecture/api-contracts.md
    notes: API and service projects must publish contracts before consumers depend on them.
  - pillar: infrastructure
    status: applied
    evidence:
      - infra/.gitkeep
      - docs/architecture/monorepo.md
    notes: Infrastructure lives in `infra/` and must be versioned as code when added.
  - pillar: devops
    status: applied
    evidence:
      - .github/workflows/ci.yaml
      - .github/workflows/cd.yaml
      - .github/workflows/repository-health.yml
      - Makefile
    notes: CI validates the template; CD readiness gates delivery without assuming a stack.
  - pillar: security
    status: applied
    evidence:
      - SECURITY.md
      - docs/governance/security-model.md
      - AI_AGENTS/policies/README.md
    notes: Secrets, MCP tools, RAG corpora and external contracts are treated as sensitive.
  - pillar: quality_assurance
    status: applied
    evidence:
      - scripts/verify-repository.sh
      - scripts/verify-pillar-coverage.sh
      - scripts/verify-contracts.sh
      - scripts/verify-agents.sh
    notes: The root verification suite is intentionally language-neutral.
  - pillar: data
    status: applied
    evidence:
      - contracts/rag/rag-profile.template.yml
      - AI_AGENTS/rag/README.md
    notes: RAG and data systems must document corpus, retention, quality and privacy.
  - pillar: product_ux
    status: applied
    evidence:
      - docs/templates/PROJECT.md
      - .github/ISSUE_TEMPLATE/project_proposal.yml
    notes: Every project proposal must describe objective, owner and expected impact.
  - pillar: architecture
    status: applied
    evidence:
      - docs/architecture/universal-project-model.md
      - docs/templates/ADR.md
      - docs/templates/RFC.md
    notes: Structural decisions should be captured with ADRs, RFCs and diagrams.
  - pillar: sre
    status: applied
    evidence:
      - docs/governance/release-management.md
      - docs/checklists/universal-project-readiness.md
    notes: Production projects must define observability, incident and rollback expectations.
  - pillar: it_governance
    status: applied
    evidence:
      - catalog/owners.yml
      - catalog/projects.yml
      - docs/governance/compliance-matrix.md
    notes: Ownership, risk and compliance are cataloged at repository level.
  - pillar: developer_experience
    status: applied
    evidence:
      - AGENTS.md
      - AI_AGENTS/README.md
      - Makefile
    notes: Humans and agents get predictable commands, instructions and templates.
  - pillar: sustainability
    status: applied
    evidence:
      - docs/architecture/universal-project-model.md
      - docs/checklists/universal-project-readiness.md
    notes: Projects must evaluate waste, resource usage and idle environments when applicable.
